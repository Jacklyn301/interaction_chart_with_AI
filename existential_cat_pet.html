<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>your existential cat pet 🐱</title>
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='black'/%3E%3Cpath d='M20 10c8 0 8 12 16 12s8-12 16-12' stroke='%238b5cf6' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3Cpath d='M20 54c8 0 8-12 16-12s8 12 16 12' stroke='%2360a5fa' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3Cpath d='M26 18l12 12M26 30l12-12M26 34l12 12M26 46l12-12' stroke='%23facc15' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
      font-family: "Segoe UI", sans-serif;
      background: #09090b;
      color: #f4f4f5;
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 100vh;
    }

    .app {
      position: relative;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      overflow-y: visible;
    }

    .weather-layer {
      position: fixed;
      inset: 0;
      overflow-x: hidden;
      transition:
        opacity 0.7s ease,
        filter 0.7s ease,
        transform 0.7s ease;
    }

    .weather-transition {
      opacity: 0;
      filter: blur(8px);
      transform: scale(1.03);
    }

    .rain-bg,
    .snow-bg,
    .aurora-bg {
      position: absolute;
      inset: 0;
    }

    .rain-bg {
      background: linear-gradient(135deg, #0f172a, #082f49, #09090b);
    }

    .snow-bg {
      background: linear-gradient(to bottom, #334155, #172554, #09090b);
    }

    .aurora-bg {
      background: black;
    }

    .aurora-wave {
      position: absolute;
      width: 120%;
      height: 120%;
      top: -20%;
      left: -10%;
      background: linear-gradient(
        to right,
        rgba(34, 211, 238, 0.2),
        rgba(168, 85, 247, 0.2),
        rgba(74, 222, 128, 0.2)
      );
      filter: blur(80px);
      animation: auroraShift 12s ease-in-out infinite;
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: auto;
      padding: 24px;
      padding-bottom: 120px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 8px;
      color: #a1a1aa;
      line-height: 1.6;
      max-width: 600px;
    }

    .weather-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .weather-btn,
    .action-btn {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(24, 24, 27, 0.7);
      color: white;
      border-radius: 18px;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(10px);
    }

    .weather-btn {
      padding: 10px 16px;
    }

    .weather-btn:hover,
    .action-btn:hover {
      transform: translateY(-2px);
      background: rgba(39, 39, 42, 0.9);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .panel {
      background: rgba(24, 24, 27, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 24px;
      backdrop-filter: blur(18px);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
    }

    .cat-zone {
      position: relative;
      height: 360px;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      background: linear-gradient(to bottom, #18181b, #27272a);
    }

    .cat {
      font-size: 10rem;
      cursor: pointer;
      transition: 0.3s ease;
      position: relative;
      user-select: none;
    }

    .cat:hover {
      transform: scale(1.05);
    }

    .zoomies {
      animation: zoomies 0.35s infinite alternate;
    }

    .dialogue {
      position: absolute;
      top: 24px;
      max-width: 260px;
      background: rgba(24, 24, 27, 0.96);
      border: 1px solid rgba(34, 211, 238, 0.25);
      border-radius: 20px;
      padding: 16px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(34, 211, 238, 0.1);
    }

    .alert {
      margin-bottom: 20px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: #fde68a;
      animation: pulse 2s infinite;
    }

    .stats {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      background: #27272a;
      overflow-x: hidden;
      margin-top: 6px;
    }

    .bar-fill {
      height: 100%;
      background: #d4d4d8;
      transition: width 0.4s ease;
    }

    .thought-box {
      min-height: 120px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 18px;
      line-height: 1.7;
      transition: 0.7s ease;
      position: relative;
      overflow-x: hidden;
    }

    .thought-hidden {
      opacity: 0;
      transform: translateY(-6px);
      filter: blur(4px);
    }

    .scan-line {
      position: absolute;
      inset: 0 auto 0 -60px;
      width: 60px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(34, 211, 238, 0.3),
        transparent
      );
      transform: skewX(-20deg);
      animation: scan 0.8s ease-out;
      pointer-events: none;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .action-btn {
      padding: 18px;
      text-align: left;
    }

    .zoomies-banner {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(34, 211, 238, 0.08);
      border: 1px solid rgba(34, 211, 238, 0.18);
      color: #a5f3fc;
      animation: bounce 1s infinite;
      z-index: 20;
    }

    .particle {
      position: absolute;
      pointer-events: none;
    }

    @keyframes rainFall {
      from {
        transform: translateY(-120px) rotate(12deg);
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      to {
        transform: translateY(120vh) rotate(12deg);
        opacity: 0;
      }
    }

    @keyframes snowFall {
      from {
        transform: translateY(-10vh) translateX(0);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      50% {
        transform: translateY(50vh) translateX(20px);
      }

      to {
        transform: translateY(110vh) translateX(-20px);
        opacity: 0;
      }
    }

    @keyframes auroraShift {
      0% {
        transform: translateX(-5%) rotate(6deg);
      }

      50% {
        transform: translateX(5%) rotate(8deg) scale(1.05);
      }

      100% {
        transform: translateX(-5%) rotate(6deg);
      }
    }

    @keyframes pulse {
      50% {
        opacity: 0.7;
      }
    }

    @keyframes bounce {
      50% {
        transform: translateX(-50%) translateY(-4px);
      }
    }

    @keyframes scan {
      from {
        transform: translateX(-120%) skewX(-20deg);
        opacity: 0;
      }

      30% {
        opacity: 1;
      }

      to {
        transform: translateX(700%) skewX(-20deg);
        opacity: 0;
      }
    }

    @keyframes zoomies {
      from {
        transform: translateX(-6px) rotate(-4deg);
      }

      to {
        transform: translateX(6px) rotate(4deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="weatherLayer" class="weather-layer"></div>

    <div class="container">
      <div id="alertBox"></div>

      <div class="header">
        <div>
          <div class="title">存在主義危機貓咪模擬器</div>
          <div class="subtitle">
            歡迎來到這個賽博花園，跟著貓咪一起思考人生哲學 🐱
          </div>
        </div>

        <div class="weather-buttons">
          <button class="weather-btn" onclick="changeWeather('rain')">🌧️ 雨天</button>
          <button class="weather-btn" onclick="changeWeather('snow')">❄️ 雪天</button>
          <button class="weather-btn" onclick="changeWeather('aurora')">🌌 極光</button>
        </div>
      </div>

      <div class="layout">
        <div class="panel">
          <div class="cat-zone">
            <div id="cat" class="cat">🐈</div>

            <div id="dialogue" class="dialogue" style="display:none"></div>

            <div id="zoomiesBanner" class="zoomies-banner" style="display:none">
              ⚡ 偵測到貓咪暴衝事件 ⚡
            </div>
          </div>

          <div class="stats">
            <div>
              飢餓值
              <div class="bar"><div id="hungerBar" class="bar-fill"></div></div>
            </div>

            <div>
              精力
              <div class="bar"><div id="energyBar" class="bar-fill"></div></div>
            </div>

            <div>
              信任值
              <div class="bar"><div id="trustBar" class="bar-fill"></div></div>
            </div>
          </div>
        </div>

        <div>
          <div class="panel">
            <h2 style="margin-bottom:16px">行為紀錄</h2>
            <div id="thoughtBox" class="thought-box"></div>
          </div>

          <div class="panel" style="margin-top:24px">
            <h2 style="margin-bottom:16px">互動面板</h2>

            <div class="actions">
              <button class="action-btn" onclick="feedCat()">🍖<br>餵食</button>
              <button class="action-btn" onclick="petCat()">🤲<br>摸摸</button>
              <button class="action-btn" onclick="laserCat()">🔴<br>雷射筆</button>
              <button class="action-btn" onclick="sleepCat()">💤<br>睡覺</button>
            </div>
          </div>

          <div class="panel" style="margin-top:24px">
            <h2 style="margin-bottom:16px">心理分析</h2>

            <div style="display:flex;flex-direction:column;gap:12px;line-height:1.7;color:#d4d4d8;">
              <div>
                目前依附狀態：
                <span id="moodText" style="color:white;font-weight:600"></span>
              </div>

              <div>
                互動時被咬的機率：
                <span id="biteChance" style="color:white;font-weight:600"></span>
              </div>

              <div>
                生物學結論：
                <span id="biologyText" style="color:white;font-weight:600"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      </div>
    </div>
  </div>

  <script>
    const thoughts = [
      '貓咪盯著牆壁看了十四秒。可能看見宇宙真理了。',
      '橘貓神經元短暫啟動了 0.3 秒。',
      '窗外那片雨聲不錯。',
      '你的寵物短暫獲得了自我意識，然後後悔了。',
      '你半夜不睡覺是不是又在想人生。'
    ];

    let hunger = 62;
    let energy = 74;
    let trust = 48;
    let weather = 'rain';
    let zoomiesTimeout = null;

    const cat = document.getElementById('cat');
    const dialogue = document.getElementById('dialogue');
    const thoughtBox = document.getElementById('thoughtBox');
    const weatherLayer = document.getElementById('weatherLayer');
    const alertBox = document.getElementById('alertBox');
    const zoomiesBanner = document.getElementById('zoomiesBanner');

    function clamp(value, min = 0, max = 100) {
      return Math.min(max, Math.max(min, value));
    }

    function updateBars() {
      document.getElementById('hungerBar').style.width = hunger + '%';
      document.getElementById('energyBar').style.width = energy + '%';
      document.getElementById('trustBar').style.width = trust + '%';

      updatePsychologyPanel();
    }

    function updatePsychologyPanel() {
      const moodText = document.getElementById('moodText');
      const biteChance = document.getElementById('biteChance');
      const biologyText = document.getElementById('biologyText');

      let mood = '毛茸茸房東';

      if (trust > 80) {
        mood = '極度依戀';
      } else if (trust > 50) {
        mood = '小心翼翼地親近';
      } else if (trust > 30) {
        mood = '情感迴避貓咪';
      }

      moodText.textContent = mood;
      biteChance.textContent = Math.round(100 - trust) + '%';

      biologyText.textContent = trust > 70
        ? '這隻貓在世界末日時大概會願意坐你旁邊。'
        : '這隻貓依然把你視為大型不可預測哺乳類。';
    }

    function setThought(text) {
      thoughtBox.classList.add('thought-hidden');

      setTimeout(() => {
        thoughtBox.innerHTML = text + '<div class="scan-line"></div>';
        thoughtBox.classList.remove('thought-hidden');
      }, 220);
    }

    function updateAlert() {
      let text = '';

      if (hunger < 25) {
        text = '🍖 貓咪飢餓值過低，建議立即投餵罐罐。';
      } else if (energy < 20) {
        text = '💤 貓咪精力即將耗盡，牠快變成液體了。';
      } else if (trust < 20) {
        text = '⚠️ 信任值偏低。貓咪正在重新評估你是否值得信任。';
      }

      alertBox.innerHTML = text
        ? `<div class="alert">${text}</div>`
        : '';
    }

    function generateDialogue() {
      const pool = [];

      if (hunger < 30) {
        pool.push('你是不是忘記罐罐的存在了。');
      }

      if (energy < 30) {
        pool.push('本貓目前 CPU 使用率過高。');
      }

      if (trust > 70) {
        pool.push('你坐下，我就過去陪你。');
      }

      pool.push(
        '......喵。',
        '如果世界毀滅，記得帶罐頭。',
        '有時候我覺得你比我更像流浪動物。'
      );

      return pool[Math.floor(Math.random() * pool.length)];
    }

    function triggerZoomies() {
      if (zoomiesTimeout) {
        clearTimeout(zoomiesTimeout);
      }

      cat.classList.add('zoomies');
      zoomiesBanner.style.display = 'block';

      zoomiesTimeout = setTimeout(() => {
        cat.classList.remove('zoomies');
        zoomiesBanner.style.display = 'none';
      }, 2400);
    }

    function feedCat() {
      hunger = clamp(hunger + 18);
      trust = clamp(trust + 5);
      updateBars();
      updateAlert();
      setThought('貓咪用驚人的效率吃掉了點心。🍖');
    }

    function petCat() {
      trust = clamp(trust + 10);
      energy = clamp(energy - 3);

      const reactions = [
        'purr.exe 已啟動。',
        '你暫時被批准加入貓咪殖民地。',
        '貓咪閉眼了 1.7 秒。'
      ];

      updateBars();
      updateAlert();
      setThought(reactions[Math.floor(Math.random() * reactions.length)]);
    }

    function laserCat() {
      energy = clamp(energy - 12);
      trust = clamp(trust + 3);
      updateBars();
      updateAlert();
      triggerZoomies();
      setThought('速度已取代理性思考。🔴');
    }

    function sleepCat() {
      energy = clamp(energy + 25);
      updateBars();
      updateAlert();
      setThought('這生物縮成了一團蝦子形狀的奇點。💤');
    }

    function createParticles(type) {
      weatherLayer.innerHTML = '';

      if (type === 'rain') {
        weatherLayer.innerHTML += '<div class="rain-bg"></div>';
      }

      if (type === 'snow') {
        weatherLayer.innerHTML += '<div class="snow-bg"></div>';
      }

      if (type === 'aurora') {
        weatherLayer.innerHTML += '<div class="aurora-bg"></div>';
        weatherLayer.innerHTML += '<div class="aurora-wave"></div>';
      }

      for (let i = 0; i < 80; i++) {
        const particle = document.createElement('div');

        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';

        if (type === 'rain') {
          particle.style.width = '1px';
          particle.style.height = 10 + Math.random() * 20 + 'px';
          particle.style.background = 'rgba(103,232,249,0.7)';
          particle.style.animation = 'rainFall 0.8s linear infinite';
        }

        if (type === 'snow') {
          const size = 3 + Math.random() * 5;
          particle.style.width = size + 'px';
          particle.style.height = size + 'px';
          particle.style.borderRadius = '999px';
          particle.style.background = 'rgba(255,255,255,0.8)';
          particle.style.animation = 'snowFall 6s linear infinite';
        }

        particle.style.animationDelay = Math.random() * 4 + 's';

        weatherLayer.appendChild(particle);
      }
    }

    function changeWeather(next) {
      if (next === weather) {
        return;
      }

      weatherLayer.classList.add('weather-transition');

      setTimeout(() => {
        weather = next;
        createParticles(weather);

        setTimeout(() => {
          weatherLayer.classList.remove('weather-transition');
        }, 100);
      }, 400);
    }

    cat.addEventListener('click', () => {
      if (dialogue.style.display === 'block') {
        dialogue.style.display = 'none';
        return;
      }

      dialogue.innerHTML = `🐾 ${generateDialogue()}`;
      dialogue.style.display = 'block';
    });

    setInterval(() => {
      hunger = clamp(hunger - 1);
      energy = clamp(energy - 0.5);

      updateBars();
      updateAlert();

      if (Math.random() < 0.08) {
        setThought(thoughts[Math.floor(Math.random() * thoughts.length)]);
      }

      if (Math.random() < 0.05) {
        triggerZoomies();
      }
    }, 2200);

    updateBars();
    updateAlert();
    createParticles(weather);
    updatePsychologyPanel();
    setThought('貓咪正在默默評估你的演化適應度。');
  </script>
</body>
</html>
