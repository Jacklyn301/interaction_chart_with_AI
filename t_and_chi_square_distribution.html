<style>

<body>
<div class="panel">
<h1>t 分布 & χ² 分布：看自由度（df = n − 1）怎麼改變曲線</h1>
<p style="color:#aab">
左上角選擇分布類型；用滑桿改 df。<br>
t 分布會隨 df 增大貼近標準常態；χ² 分布則逐漸變寬並向右移動。
</p>

<div class="controls">
<button id="tBtn" class="active">t 分布</button>
<button id="chiBtn">χ² 分布</button>
<button id="autoBtn">▶ 自動遞增 df</button>
</div>

<p>自由度 df = <span id="dfLabel">2</span>　(n = <span id="nLabel">3</span>)</p>
<input id="slider" type="range" min="1" max="40" value="2" style="width:100%">

<div class="info" id="infoBox"></div>

<canvas id="chartCanvas"></canvas>
</div>

text-align:center;
color:#71717a;
font-size:12px;
margin-top:80px;
padding-bottom:20px;
font-family:Inter,sans-serif;

<script>
window.addEventListener('DOMContentLoaded',()=>{
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelector('.panel').classList.add('loaded');
    },150);
  });
});

function logGamma(z){const p=[676.5203681218851,-1259.1392167224028,771.32342877765313,-176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];const g=7;if(z<0.5)return Math.log(Math.PI)-Math.log(Math.sin(Math.PI*z))-logGamma(1-z);z-=1;let x=.99999999999980993;for(let i=0;i<p.length;i++)x+=p[i]/(z+i+1);const t=z+g+.5;return .5*Math.log(2*Math.PI)+(z+.5)*Math.log(t)-t+Math.log(x);}
const normal=x=>Math.exp(-.5*x*x)/Math.sqrt(2*Math.PI);
function tPdf(x,v){const c=logGamma((v+1)/2)-logGamma(v/2)-.5*(Math.log(v)+Math.log(Math.PI));return Math.exp(c-((v+1)/2)*Math.log(1+x*x/v));}
function chi2Pdf(x,k){if(x<=0)return 0;const c=-(k/2)*Math.log(2)-logGamma(k/2);return Math.exp(c+(k/2-1)*Math.log(x)-x/2);}

let df=2, mode='t', timer=null;
const chart=new Chart(document.getElementById('chartCanvas'),{
 type:'line',
 data:{datasets:[
  {label:'t',data:[],parsing:false,borderColor:'#60a5fa',pointRadius:0,borderWidth:3},
  {label:'N(0,1)',data:[],parsing:false,borderColor:'#fff',borderDash:[6,6],pointRadius:0,borderWidth:2}
 ]},
 options:{animation:{duration:220},scales:{x:{type:'linear'}}}
});

const xs=[]; for(let x=-5;x<=5;x+=0.02) xs.push(x);

function render(){
 dfLabel.textContent=df;
 nLabel.textContent=df+1;

 if(mode==='t'){
   const d1=chart.data.datasets[0].data;
   const d2=chart.data.datasets[1].data;
   if(d1.length===0){
      xs.forEach(x=>{d1.push({x,y:tPdf(x,df)});d2.push({x,y:normal(x)});});
   }else{
      xs.forEach((x,i)=>d1[i].y=tPdf(x,df));
   }
   chart.data.datasets[0].borderColor='#60a5fa';
   infoBox.innerHTML='• df = 1（Cauchy，超重尾）<br>• df ≈ 30 後已非常接近常態<br>• 白色虛線：標準常態 N(0,1)';
 }else{
   const xmax=Math.max(10,df+6*Math.sqrt(2*df));
   const pts=[];
   for(let x=0;x<=xmax;x+=xmax/500) pts.push({x:x,y:chi2Pdf(x,df)});
   chart.data.datasets[0].data=pts;
   chart.data.datasets[1].data=[];
   chart.data.datasets[0].borderColor='#fb923c';
   infoBox.innerHTML='• 平均 = df<br>• 方差 = 2df<br>• 自由度增加時向右移動並趨於對稱';
 }
 chart.update();
}

slider.oninput=e=>{df=+e.target.value;render();};
tBtn.onclick=()=>{mode='t';chart.data.datasets[0].data=[];chart.data.datasets[1].data=[];tBtn.classList.add('active');chiBtn.classList.remove('active');render();};
chiBtn.onclick=()=>{mode='chi';chiBtn.classList.add('active');tBtn.classList.remove('active');render();};
autoBtn.onclick=()=>{
 if(timer){clearInterval(timer);timer=null;autoBtn.textContent='▶ 自動遞增 df';}
 else{
   timer=setInterval(()=>{df=df>=40?1:df+1;slider.value=df;render();},280);
   autoBtn.textContent='■ 停止';
 }
};
render();
</script>
</body>
</html>
