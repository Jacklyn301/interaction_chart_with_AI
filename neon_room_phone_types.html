  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      overflow: hidden;
      font-family: monospace;
      background: black;
    }

    @keyframes emojiThrow {
      0% {
        transform: translateY(0);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      50% {
        transform: translateY(-65vh) rotate(180deg);
      }

      100% {
        transform: translateY(20vh) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes profileFade {
      0% {
        opacity: 0;
        transform: translateX(-10px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateX(0px) scale(1);
      }
    }

    #app {
      transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
    }

    .theme-transition {
      opacity: 0;
      transform: scale(1.03);
      filter: blur(8px);
    }

    @keyframes messageFloat {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateY(0px) scale(1);
      }
    }

    .message-enter {
      animation: messageFloat 0.45s ease;
    }

    .emoji {
      position: absolute;
      font-size: 2rem;
      animation: emojiThrow 3s ease-in-out forwards;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-black text-cyan-200">
  <div id="app" class="h-screen flex flex-col md:flex-row relative overflow-hidden">
    <aside class="w-full md:w-80 border-b md:border-b-0 md:border-r border-cyan-500/20 bg-cyan-950/10 backdrop-blur-xl p-4 flex flex-col max-h-[38vh] md:max-h-none overflow-y-auto">
      <h1 class="text-3xl font-bold text-cyan-300 mb-2">NEON//ROOM</h1>

      <p class="text-xs opacity-70 mb-4">
        未授權地下通訊節點
      </p>

      <div class="mb-5 rounded-2xl border border-cyan-500/20 bg-black/30 p-3 space-y-2">
        <div class="text-xs opacity-70">你的代號</div>

        <input
          id="usernameInput"
          placeholder="輸入你的代號⋯⋯"
          class="w-full rounded-xl border border-cyan-500/20 bg-black/40 px-3 py-2 text-sm outline-none"
          value="kitten"
        />

        <button
          id="confirmUsername"
          class="w-full rounded-xl border border-cyan-500/20 bg-cyan-500/10 px-3 py-2 text-sm hover:bg-cyan-500/20 transition-all"
        >
          確認代號
        </button>
      </div>

      <div id="userList" class="space-y-3 overflow-auto pr-1"></div>

      <div
        id="profilePanel"
        class="hidden mt-4 rounded-3xl border border-cyan-500/20 bg-black/40 p-4 text-xs space-y-2"
        style="animation: profileFade 0.4s ease"
      ></div>
    </aside>

    <main class="flex-1 flex flex-col backdrop-blur-md">
      <header class="border-b border-white/10 bg-black/40 px-4 md:px-6 py-4 flex flex-col md:flex-row gap-3 md:gap-0 items-start md:items-center justify-between">
        <div>
          <h2 id="roomTitle" class="text-xl font-bold text-cyan-300">
            標準模式
          </h2>

          <p class="text-xs opacity-70">加密都市聊天室</p>
        </div>

        <div class="flex gap-2 md:gap-3 flex-wrap">
          <button onclick="switchTheme(0)" class="rounded-xl bg-cyan-500/10 px-3 py-2 text-xs hover:scale-105 transition-all">
            標準模式
          </button>

          <button onclick="switchTheme(1)" class="rounded-xl bg-pink-500/10 px-3 py-2 text-xs hover:scale-105 transition-all">
            霓虹模式
          </button>

          <button onclick="switchTheme(2)" class="rounded-xl bg-green-500/10 px-3 py-2 text-xs hover:scale-105 transition-all">
            避難模式
          </button>
        </div>
      </header>

      <section id="chat" class="flex-1 overflow-y-auto px-3 md:px-6 py-4 md:py-6 space-y-4"></section>

      <footer class="border-t border-white/10 bg-black/40 p-3 md:p-4 relative">
        <div class="flex gap-2 md:gap-3 items-center">
          <button
            id="attackButton"
            class="rounded-2xl border border-red-500/20 px-4 py-3 hover:bg-red-500/20 transition-all"
          >
            +
          </button>

          <div
            id="attackPanel"
            class="hidden absolute bottom-24 left-2 right-2 md:left-4 md:right-auto md:w-80 rounded-3xl border border-red-500/20 bg-black/90 p-4 backdrop-blur-xl z-50 max-h-[60vh] overflow-y-auto"
          >
            <div class="mb-3 text-sm text-red-300 font-bold">
              選擇攻擊對象 🌚
            </div>

            <div id="attackTargets" class="space-y-2"></div>

            <button
              onclick="launchEmojiStorm()"
              class="mt-4 w-full rounded-2xl border border-pink-500/20 bg-pink-500/10 py-2 hover:scale-[1.02] transition-all"
            >
              啟動 Emoji 風暴 🤣
            </button>
          </div>

          <input
            id="messageInput"
            placeholder="將思緒投射進虛空⋯⋯"
            class="flex-1 min-w-0 rounded-2xl border border-cyan-500/20 bg-black/30 px-4 py-3 outline-none text-sm md:text-base"
          />

          <button
            id="sendButton"
            class="rounded-2xl border border-cyan-500/20 bg-cyan-500/10 px-4 md:px-5 py-3 hover:bg-cyan-500/20 transition-all shrink-0"
          >
            發送
          </button>
        </div>
      </footer>
    </main>
  </div>

  <script>
    let username = 'kitten';
    let theme = 0;

    const themes = [
      {
        room: '標準模式',
        bg: 'black',
        color: '#67e8f9',
      },
      {
        room: '霓虹模式',
        bg: '#190014',
        color: '#f9a8d4',
      },
      {
        room: '避難模式',
        bg: '#04120a',
        color: '#86efac',
      },
    ];

    const users = [
      {
        name: 'biohazard',
        status: '在線中 🧐',
        danger: '78%',
      },
      {
        name: 'ghostwire.exe',
        status: '正在監聽 👀',
        danger: '91%',
      },
      {
        name: 'rat_king',
        status: '正在發瘋 💀',
        danger: '66%',
      },
      {
        name: 'thermal_decay',
        status: '低功耗模式 🫠',
        danger: '48%',
      },
      {
        name: 'kitten',
        status: '聊天室災難源頭',
        danger: '？？？？？？',
      },
    ];

    const chat = document.getElementById('chat');
    const attackPanel = document.getElementById('attackPanel');
    const userList = document.getElementById('userList');
    const profilePanel = document.getElementById('profilePanel');

    function appendMessage(user, text, type = 'other') {
      const div = document.createElement('div');

      const styles = {
        self: 'ml-auto bg-cyan-400/10 border-cyan-300/30',
        system: 'bg-yellow-500/10 border-yellow-300/20 text-yellow-100',
        other: 'bg-fuchsia-500/10 border-fuchsia-300/20',
      };

      div.className = `max-w-[92%] md:max-w-2xl rounded-3xl border p-3 md:p-4 shadow-2xl message-enter ${styles[type]}`;

      div.innerHTML = `
        <div class="flex justify-between mb-2 text-xs opacity-70">
          <span>${user}</span>
          <span>${Date.now()}</span>
        </div>
        <p class="text-sm leading-relaxed">${text}</p>
      `;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;

      while (chat.children.length > 18) {
        chat.removeChild(chat.firstChild);
      }
    }

    function launchEmojiStorm() {
      const emojis = ['🤣', '💀', '🔥', '☠️', '📡', '🤖'];

      for (let i = 0; i < 35; i++) {
        const emoji = document.createElement('div');

        emoji.className = 'emoji';
        emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        emoji.style.left = Math.random() * 100 + '%';
        emoji.style.bottom = '-40px';

        document.body.appendChild(emoji);

        setTimeout(() => {
          emoji.remove();
        }, 3000);
      }

      appendMessage(
        'SYSTEM',
        '聊天室情緒模組失控，emoji 正在滿天亂飛',
        'system'
      );
    }

    function switchTheme(index) {
      const app = document.getElementById('app');

      app.classList.add('theme-transition');

      setTimeout(() => {
        theme = index;

      document.body.style.background = themes[index].bg;
      document.body.style.color = themes[index].color;

      document.getElementById('roomTitle').innerText = themes[index].room;

      chat.innerHTML = '';

      if (theme === 0) {
        appendMessage('SYSTEM', '神經連線已建立。📡', 'system');
        appendMessage('biohazard', '今晚的企業監控濃度有點高。☕');
      }

      if (theme === 1) {
        appendMessage('SYSTEM', '夜店模式啟動。🌆', 'system');
        appendMessage('ghostwire.exe', '有人把腦波同步器接到 DJ 台上了。🤣');
      }

      if (theme === 2) {
        appendMessage('SYSTEM', '避難模式啟動。⚠️', 'system');
        appendMessage('thermal_decay', '他媽今天第七次停電了。💀');
      }

      setTimeout(() => {
        app.classList.remove('theme-transition');
      }, 50);
    }, 250);
  }

    function renderUsers() {
      userList.innerHTML = '';

      users.forEach((user) => {
        const actualName = user.name === 'kitten' ? username : user.name;

        const btn = document.createElement('button');

        btn.className = 'w-full rounded-2xl border border-white/10 bg-black/30 px-4 py-3 text-left hover:bg-white/10 transition-all';

        btn.innerHTML = `
          <div class="flex justify-between">
            <span>${actualName}</span>
            <span class="text-xs opacity-60">${user.status}</span>
          </div>
        `;

        btn.onclick = () => {
          profilePanel.classList.remove('hidden');

          profilePanel.innerHTML = `
            <div class="text-sm font-bold text-cyan-300">${actualName} 的人物資料</div>
            <div>危險程度：${user.danger}</div>
            <div>精神狀態：${user.status}</div>
            <div>義體同步率：${Math.floor(Math.random() * 100)}%</div>
          `;
        };

        userList.appendChild(btn);
      });
    }

    function renderAttackTargets() {
      const container = document.getElementById('attackTargets');

      container.innerHTML = '';

      users
        .filter((u) => (u.name === 'kitten' ? username : u.name) !== username)
        .forEach((user) => {
          const actualName = user.name === 'kitten' ? username : user.name;

          const btn = document.createElement('button');

          btn.className = 'w-full rounded-2xl border border-white/10 bg-red-500/10 px-3 py-2 text-left hover:bg-red-500/20 transition-all';

          btn.innerText = `⚠️ ${actualName}`;

          btn.onclick = () => {
            const attacks = [
              `${actualName}：企業 AI 看了你的發言都想辭職。🌚`,
              `${actualName}：你的 CPU 散熱器是不是拿泡麵盒做的？🤣`,
            ];

            const retaliations = [
              `${actualName} 對你發射精神污染 meme 彈幕。📡`,
              `${actualName} 在你家窗外播放土味 EDM。🔊`,
            ];

            appendMessage(username, `我正式攻擊 ${actualName}。🌚💥`, 'self');
            appendMessage(actualName, attacks[Math.floor(Math.random() * attacks.length)]);
            appendMessage(actualName, retaliations[Math.floor(Math.random() * retaliations.length)]);
            appendMessage('SYSTEM', '偵測到高濃度情緒污染。⚠️', 'system');

            attackPanel.classList.add('hidden');
          };

          container.appendChild(btn);
        });
    }

    document.getElementById('attackButton').onclick = () => {
      attackPanel.classList.toggle('hidden');
      renderAttackTargets();
    };

    document.getElementById('confirmUsername').onclick = () => {
      const value = document.getElementById('usernameInput').value.trim();

      username = value || 'kitten';

      appendMessage(
        'SYSTEM',
        `使用者代號已更新為 ${username}。📡`,
        'system'
      );

      renderUsers();
    };

    document.getElementById('sendButton').onclick = sendMessage;

    document.getElementById('messageInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();

      if (!text) return;

      appendMessage(username, text, 'self');

      const replies = [
        'ghostwire.exe：這聊天室快變成精神病院 MMO。🧠',
        'biohazard：企業 AI 正在偷偷分析你的情緒。📡',
        'rat_king：笑死，這地方遲早被企業炸掉。🤣💣',
      ];

      const reply = replies[Math.floor(Math.random() * replies.length)];

      appendMessage(reply.split('：')[0], reply.split('：')[1]);

      const chaosWords = ['🤣', 'lol', '幹', 'wtf', '🌚', '💀', 'XD', '神經病'];

      const trigger = chaosWords.some((word) =>
        text.toLowerCase().includes(word.toLowerCase())
      );

      if (trigger && Math.random() < 0.7) {
        setTimeout(() => {
          launchEmojiStorm();
        }, 400);
      }

      input.value = '';
    }

    renderUsers();
    switchTheme(0);
  </script>
</body>
</html>
